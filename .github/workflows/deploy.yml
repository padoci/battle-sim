name: Deploy to GitHub Pages

# Deploys the built app to GitHub Pages. Fires when main updates (e.g. a PR
# merges) and can be run by hand from the Actions tab.
#
# One-time setup by a repo admin: Settings → Pages → Build and deployment →
# Source: "GitHub Actions". (The configure-pages step below also attempts to
# enable it automatically.)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege for the Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Project Pages serve under /<repo>/.
          DEPLOY_BASE: /battle-sim/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
