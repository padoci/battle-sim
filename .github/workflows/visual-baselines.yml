name: Update visual baselines

# Regenerates the committed visual-regression baselines (test/visual/**) in the
# CI environment and commits them to the chosen branch. Run this AFTER an
# intentional visual change (a restyle, a layout tweak) so the new look becomes
# the baseline. The regular CI "Visual regression" job only ever COMPARES — it
# never updates on its own except the one-time first-run bootstrap.
#
# Note: workflow_dispatch is only available once this file is on the default
# branch. Before then, the CI job bootstraps the first set of baselines itself.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: visual-baselines-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Regenerate baselines
        run: npx playwright test --update-snapshots
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain test/visual)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add test/visual
            git commit -m "chore: update visual regression baselines"
            git push
          else
            echo "visual baselines unchanged"
          fi
