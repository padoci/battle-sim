name: CI

# Runs on every pull request (and on demand). Unlike the local dev sandbox,
# GitHub runners have real network access, so the e2e walkthroughs load the
# real Pokémon sprites and their screenshots (uploaded as artifacts) show the
# actually-rendered app — the thing the sandbox can't see.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Type-check + build
        run: npm run build

  e2e:
    name: E2E walkthroughs (real network + screenshots)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: E2E — Can you 6-0?
        run: node scripts/e2e-six-oh.mjs --shots-dir logs
      - name: E2E — Test your team
        run: node scripts/e2e-test-your-team.mjs --shots-dir logs
      - name: Mobile + reduced-motion screenshots
        run: node scripts/shots-mobile.mjs --shots-dir logs
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: logs/*.png
          if-no-files-found: warn

  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    # Needs write access to commit the baselines the first time they're generated.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR branch itself (not the detached merge ref) so the
          # first-run baseline bootstrap can push back.
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate TCGdex art map (bootstrap on first run)
        run: |
          if [ "$(cat src/data/tcgArtMap.json)" = "{}" ]; then
            echo "::notice::Art map is empty — resolving it against the real TCGdex API and committing."
            node scripts/generate-tcg-art-map.mjs
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/tcgArtMap.json
            git commit -m "chore: bootstrap TCGdex art map [skip ci]"
            git push
          fi
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Compare against baselines (bootstrap them on first run)
        run: |
          if [ -n "$(find test/visual -name '*.png' 2>/dev/null)" ]; then
            npx playwright test
          else
            echo "::notice::No visual baselines committed yet — generating them in CI and committing."
            npx playwright test --update-snapshots
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add test/visual
            git commit -m "chore: bootstrap visual regression baselines [skip ci]"
            git push
          fi
      - name: Upload Playwright report (diffs on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn
